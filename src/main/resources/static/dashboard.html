<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="main-content">
    <div class="navbar">
        <h1>Dashboard Overview</h1>
        <div class="user-profile">
            <span id="userName">Admin</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Tasks</h3>
            <div class="value" id="totalTasks">0</div>
        </div>
        <div class="stat-card">
            <h3>Completed</h3>
            <div class="value" id="completedTasks" style="color: var(--success);">0</div>
        </div>
        <div class="stat-card">
            <h3>Pending</h3>
            <div class="value" id="pendingTasks" style="color: var(--warning);">0</div>
        </div>
        <div class="stat-card">
            <h3>Overdue</h3>
            <div class="value" id="overdueTasks" style="color: var(--danger);">0</div>
        </div>
    </div>

    <h2 style="margin-bottom: 1rem;">Recent Tasks</h2>
    <div class="data-table-container">
        <table id="recentTasksTable">
            <thead>
            <tr>
                <th>Title</th>
                <th>Project</th>
                <th>Assigned To</th>
                <th>Status</th>
                <th>Due Date</th>
            </tr>
            </thead>
            <tbody>
            <!-- Tasks will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
    checkAuth();
    renderSidebar('dashboard');

    async function loadDashboardData() {
        try {
            const tasks = await TaskAPI.getAll();
            const now = new Date();

            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'DONE').length;
            const pending = tasks.filter(t => t.status === 'PENDING').length;
            const overdue = tasks.filter(t => t.status !== 'DONE' && new Date(t.dueDate) < now).length;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('overdueTasks').textContent = overdue;

            const tbody = document.querySelector('#recentTasksTable tbody');
            tbody.innerHTML = tasks.slice(0, 5).map(task => `
                <tr>
                    <td>${task.title}</td>
                    <td>${task.project.name}</td>
                    <td>${task.assignedTo.username}</td>
                    <td><span class="badge badge-${task.status.toLowerCase().replace('_', '')}">${task.status}</span></td>
                    <td>${task.dueDate}</td>
                </tr>
            `).join('');

        } catch (error) {
            console.error('Failed to load dashboard:', error);
        }
    }

    loadDashboardData();
</script>
</body>
</html>
