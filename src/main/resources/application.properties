spring.application.name=taskmanager



# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
taskmanager.app.jwtSecret=secretKeyForJwtTokenGenerationTeamTaskManagerProjectVeryLongAndSecure
taskmanager.app.jwtExpirationMs=86400000

# Server Configuration
server.port=8081

# Logging
logging.level.org.springframework.security=DEBUG
